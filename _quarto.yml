  abstract: |
    Transportation agencies regularly use Temporary portable rumble strips (TPRS) to alert 
    drivers to upcoming work zones or other changing traffic conditions, based on previous research
    showing TPRS to effectively reduce traffic speed and increase driver attentiveness.
    However, questions persist regarding the continued effectiveness of TPRS as drivers become accustomed to them,
    the preferred spacing of TPRS, and the need for workers to periodically enter the roadway and
    adjust the TPRS when they become displaced.
    This research presents the results of a field experiment at four sites in Utah with varying
    deployment conditions and TPRS spacings. The sites were instrumented with radar speed detectors and video cameras
    to capture change in speed, braking behavior, avoidance, strip displacement, and worker exposure.
    Results indicate that the effect of TPRS on speed reduction is inconclusive. Drivers who braked in response
    to TPRS typically did so before reaching the devices, suggesting that visual
    cues may be as influential as tactile feedback for most drivers. Avoidance behavior was
    common among motorcycles and occurred occasionally among other vehicles.
    Driver responses were more strongly influenced by site-specific factors—such
    as roadway geometry and sight distance—than by TPRS spacing. TPRS
    displacement occurred gradually under traffic but was not clearly related to
    traffic volume or speed, suggesting that device condition play a
    larger role. Maintenance requires traffic gaps of approximately 34 seconds,
    which may not be feasible at higher-volume sites. These findings highlight
    the need for further evaluation of TPRS effectiveness, standards for device
    condition, consideration of alternative measures for long-term work zones,
    and increased contractor discretion based on site conditions.
