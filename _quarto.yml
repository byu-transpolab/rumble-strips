  abstract: |
    This study evaluates the effectiveness and operational implications of
    Temporary Portable Rumble Strips (TPRS) used by the Utah Department of
    Transportation (UDOT) to alert drivers to upcoming work zones. While TPRS
    are intended to capture driver attention and reduce crash risk, concerns
    remain regarding their influence on driver behavior, avoidance maneuvers,
    and maintenance requirements. A field experiment was conducted at four work
    zones in Utah during the Summer 2025 construction season. Four deployment
    conditions—no TPRS and three spacing configurations—were tested. Data
    collection included speed measurements using mobile radar detectors and
    video-based observations of vehicle classification, braking behavior,
    avoidance maneuvers, and TPRS displacement. Results indicate that the effect
    of TPRS on speed reduction is inconclusive. Drivers who braked in response
    to TPRS typically did so before reaching the devices, suggesting that visual
    cues may be as influential as tactile feedback. Avoidance behavior was
    common among motorcycles and occurred occasionally among other vehicles.
    Driver responses were more strongly influenced by site-specific factors—such
    as roadway geometry and sight distance—than by TPRS spacing. TPRS
    displacement occurred gradually under traffic but was not clearly related to
    traffic volume or speed, suggesting that device age and condition play a
    larger role. Maintenance requires traffic gaps of approximately 34 seconds,
    which may not be feasible at higher-volume sites. These findings highlight
    the need for further evaluation of TPRS effectiveness, standards for device
    condition, consideration of alternative measures for long-term work zones,
    and increased contractor discretion based on site conditions.

