$schema: https://m.canouil.dev/quarto-wizard/assets/schema/v1/extension-schema.json

formats:
  mdpi-pdf:
    article_status:
      type: string
      enum:
        - submit
        - accepted
      description: Article status shown in the MDPI title block.
    article_type:
      type: string
      description: MDPI article type (for example article, review, communication).
    mdpi_journal:
      type: string
      description: MDPI journal identifier (for example behavsci).
    fundingstatement:
      type: string
      description: Funding statement text.
    institutionalreview:
      type: string
      description: Institutional review board statement.
    informedconsent:
      type: string
      description: Informed consent statement.
    dataavailability:
      type: string
      description: Data availability statement.
    acknowledgements:
      type: string
      description: Acknowledgements section text.
    conflictsofinterest:
      type: string
      description: Conflict of interest statement.
